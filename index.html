<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events for Career in Switzerland</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #03030a;
  --border: rgba(255,255,255,0.08);
  --text: #e8eaf0;
  --muted: #5a5a78;
  --white: #f0f2f8;
  --accent: #7eb8d4;
  --accent-dim: rgba(126,184,212,0.14);
  --gold: #b89a6a;
  --gold-dim: rgba(184,154,106,0.15);
  --green: #5aaa88;
  --violet: #8878b8;
  --violet-dim: rgba(136,120,184,0.14);
  --red: #a84848;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
#alpineCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.scene-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background:linear-gradient(to bottom,rgba(3,3,10,0.08) 0%,rgba(3,3,10,0) 12%,rgba(3,3,10,0) 34%,rgba(3,3,10,0.38) 52%,rgba(3,3,10,0.82) 68%,rgba(3,3,10,0.97) 80%,rgba(3,3,10,1) 100%);}
.scene-overlay::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 120% 100% at 50% 50%,transparent 55%,rgba(3,3,10,0.5) 100%);}
.wrapper{position:relative;z-index:2;}
.hero{min-height:58vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 3rem 3rem;}
.hero-title{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:clamp(2.2rem,5.5vw,5rem);line-height:1;letter-spacing:-0.03em;color:#f2f4f8;text-shadow:0 2px 40px rgba(0,0,0,0.8);animation:riseIn 1s ease both;}
.hero-title span{display:block;font-weight:300;color:rgba(220,228,240,0.72);font-size:0.52em;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:0.35em;font-family:'DM Sans','Helvetica Neue',sans-serif;}
.hero-sub{margin-top:1rem;font-size:0.78rem;color:rgba(160,168,188,0.85);letter-spacing:0.04em;max-width:520px;line-height:1.8;font-weight:300;animation:riseIn 1s 0.15s ease both;}
@keyframes riseIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.navbar{position:sticky;top:0;z-index:100;background:rgba(3,3,10,0.9);backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6);border-bottom:1px solid var(--border);padding:0.8rem 3rem;display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;}
.filter-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-right:0.3rem;}
.filter-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:0.26rem 0.78rem;font-family:'DM Sans','Helvetica Neue',sans-serif;font-size:0.68rem;font-weight:400;letter-spacing:0.03em;cursor:pointer;transition:all 0.16s;border-radius:2px;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:0.75rem;}
.last-upd{font-size:0.6rem;color:var(--muted);text-align:right;line-height:1.5;}
.last-upd span{color:var(--green);}
.refresh-btn{background:transparent;border:1px solid rgba(126,184,212,0.4);color:var(--accent);padding:0.28rem 0.95rem;font-family:'DM Sans','Helvetica Neue',sans-serif;font-size:0.64rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.16s;border-radius:2px;}
.refresh-btn:hover{background:var(--accent-dim);}
.refresh-btn:disabled{opacity:0.3;cursor:not-allowed;}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:2px;overflow:hidden;}
.view-btn{background:transparent;border:none;border-right:1px solid var(--border);color:var(--muted);padding:0.26rem 0.58rem;font-size:0.85rem;cursor:pointer;transition:all 0.14s;line-height:1;}
.view-btn:last-child{border-right:none;}
.view-btn:hover{color:var(--text);background:rgba(255,255,255,0.04);}
.view-btn.active{background:var(--accent-dim);color:var(--accent);}
main{padding:2rem 3rem 5rem;max-width:1080px;}
.status-bar{display:flex;align-items:center;gap:0.65rem;margin-bottom:1.2rem;font-size:0.64rem;color:var(--muted);letter-spacing:0.04em;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.dot.loading{background:var(--accent);animation:pulse 1s infinite;}
.dot.done{background:var(--green);}
.dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.15;}}
.ai-bar{display:none;align-items:center;gap:1rem;padding:0.82rem 1.2rem;background:rgba(126,184,212,0.04);border:1px solid rgba(126,184,212,0.18);margin-bottom:1.5rem;font-size:0.68rem;color:var(--accent);letter-spacing:0.04em;border-radius:2px;}
.ai-bar.show{display:flex;}
.ai-dots span{display:inline-block;width:4px;height:4px;background:var(--accent);border-radius:50%;margin:0 2px;animation:bdot 1s infinite;}
.ai-dots span:nth-child(2){animation-delay:.2s;}
.ai-dots span:nth-child(3){animation-delay:.4s;}
@keyframes bdot{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.err-bar{display:none;padding:0.78rem 1.2rem;background:rgba(168,72,72,0.07);border:1px solid rgba(168,72,72,0.22);font-size:0.68rem;color:var(--red);margin-bottom:1.5rem;border-radius:2px;}
.err-bar.show{display:block;}
.stats-row{display:none;gap:0.6rem;margin-bottom:1.8rem;flex-wrap:wrap;}
.stats-row.show{display:flex;}
.stat{padding:0.6rem 1rem;border:1px solid var(--border);background:rgba(8,8,20,0.6);backdrop-filter:blur(8px);border-radius:2px;min-width:90px;}
.stat strong{display:block;font-family:'Helvetica Neue',Helvetica,sans-serif;font-size:1.75rem;font-weight:700;color:var(--accent);line-height:1;margin-bottom:0.15rem;letter-spacing:-0.02em;}
.stat span{font-size:0.56rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
.calendar-view,.list-view{display:none;}
.calendar-view.active,.list-view.active{display:block;}
.month-label{font-family:'Helvetica Neue',Helvetica,sans-serif;font-size:0.7rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:rgba(148,158,180,0.7);margin:2.2rem 0 0.9rem;display:flex;align-items:center;gap:1.2rem;}
.month-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.06) 0%,transparent 100%);}
.cal-row{display:grid;grid-template-columns:64px 1fr;margin-bottom:0.35rem;}
.cal-date{padding:0.75rem 0.9rem 0.65rem 0;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;}
.cal-date .num{font-family:'Helvetica Neue',Helvetica,sans-serif;font-size:1.65rem;font-weight:700;color:rgba(255,255,255,0.08);line-height:1;letter-spacing:-0.02em;transition:color 0.2s;}
.cal-row:hover .cal-date .num{color:rgba(255,255,255,0.25);}
.cal-date .dn{font-size:0.5rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:0.18rem;}
.cal-events{padding:0.38rem 0 0.38rem 1rem;display:flex;flex-direction:column;gap:0.28rem;}
.ev-card{position:relative;background:rgba(8,10,20,0.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-left:2px solid var(--accent);padding:0.55rem 0.85rem;cursor:pointer;transition:all 0.18s;overflow:hidden;border-radius:0 2px 2px 0;}
.ev-card::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--accent-dim),transparent 55%);opacity:0;transition:opacity 0.18s;}
.ev-card:hover{border-color:rgba(126,184,212,0.45);transform:translateX(3px);}
.ev-card:hover::before{opacity:1;}
.ev-card.career{border-left-color:var(--gold);}
.ev-card.career::before{background:linear-gradient(90deg,var(--gold-dim),transparent 55%);}
.ev-card.corporate{border-left-color:var(--violet);}
.ev-card.corporate::before{background:linear-gradient(90deg,var(--violet-dim),transparent 55%);}
.ev-card.meetup{border-left-color:var(--green);}
.ev-card.meetup::before{background:linear-gradient(90deg,rgba(90,170,136,0.12),transparent 55%);}
.ev-top{display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;margin-bottom:0.22rem;position:relative;z-index:1;}
.ev-title{font-size:0.78rem;font-weight:500;color:var(--white);line-height:1.35;letter-spacing:0.01em;}
.ev-badge{font-size:0.5rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.1rem 0.45rem;border:1px solid;white-space:nowrap;flex-shrink:0;border-radius:1px;font-weight:500;}
.badge-tech{color:var(--accent);border-color:rgba(126,184,212,0.28);}
.badge-career{color:var(--gold);border-color:rgba(184,154,106,0.28);}
.badge-corporate{color:var(--violet);border-color:rgba(136,120,184,0.28);}
.badge-meetup{color:var(--green);border-color:rgba(90,170,136,0.28);}
.ev-meta{display:flex;gap:0.75rem;flex-wrap:wrap;font-size:0.59rem;color:var(--muted);position:relative;z-index:1;letter-spacing:0.02em;}
.ev-src{font-size:0.54rem;color:rgba(90,90,120,0.45);margin-top:0.18rem;position:relative;z-index:1;}
.list-card{background:rgba(8,10,20,0.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-left:2px solid var(--accent);padding:0.95rem 1.25rem;margin-bottom:0.4rem;cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden;border-radius:0 2px 2px 0;}
.list-card::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--accent-dim),transparent 45%);opacity:0;transition:opacity 0.18s;}
.list-card:hover{transform:translateX(3px);border-color:rgba(126,184,212,0.4);}
.list-card:hover::before{opacity:1;}
.list-card.career{border-left-color:var(--gold);}
.list-card.career::before{background:linear-gradient(90deg,var(--gold-dim),transparent 45%);}
.list-card.corporate{border-left-color:var(--violet);}
.list-card.corporate::before{background:linear-gradient(90deg,var(--violet-dim),transparent 45%);}
.list-card.meetup{border-left-color:var(--green);}
.list-card.meetup::before{background:linear-gradient(90deg,rgba(90,170,136,0.1),transparent 45%);}
.lc-date{font-size:0.6rem;letter-spacing:0.12em;color:var(--accent);margin-bottom:0.38rem;position:relative;z-index:1;text-transform:uppercase;font-weight:500;}
.list-card.career .lc-date{color:var(--gold);}
.list-card.corporate .lc-date{color:var(--violet);}
.list-card.meetup .lc-date{color:var(--green);}
.lc-title{font-family:'Helvetica Neue',Helvetica,sans-serif;font-size:1.05rem;font-weight:500;color:var(--white);line-height:1.25;margin-bottom:0.42rem;position:relative;z-index:1;display:flex;align-items:baseline;gap:0.6rem;flex-wrap:wrap;letter-spacing:-0.01em;}
.lc-desc{font-size:0.69rem;color:var(--muted);line-height:1.65;margin-bottom:0.6rem;position:relative;z-index:1;}
.lc-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;position:relative;z-index:1;}
.lc-meta{font-size:0.6rem;color:var(--muted);}
.lc-link{font-size:0.6rem;color:var(--accent);text-decoration:none;letter-spacing:0.06em;border-bottom:1px solid rgba(126,184,212,0.25);transition:border-color 0.14s;}
.list-card.career .lc-link{color:var(--gold);border-bottom-color:rgba(184,154,106,0.25);}
.list-card.corporate .lc-link{color:var(--violet);border-bottom-color:rgba(136,120,184,0.25);}
.list-card.meetup .lc-link{color:var(--green);border-bottom-color:rgba(90,170,136,0.25);}
.lc-link:hover{border-color:currentColor;}
.lc-src{font-size:0.54rem;color:rgba(90,90,120,0.38);margin-top:0.42rem;position:relative;z-index:1;}
.skel{background:linear-gradient(90deg,rgba(10,10,24,0.7) 25%,rgba(255,255,255,0.03) 50%,rgba(10,10,24,0.7) 75%);background-size:200% 100%;animation:shimmer 1.8s infinite;border:1px solid var(--border);border-left:2px solid var(--border);height:72px;margin-bottom:0.38rem;border-radius:0 2px 2px 0;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.empty{text-align:center;padding:5rem 2rem;color:var(--muted);}
.empty .ico{font-size:2.2rem;opacity:0.2;margin-bottom:1rem;}
.empty p{font-size:0.82rem;letter-spacing:0.04em;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}
@media(max-width:640px){.hero{padding:0 1.2rem 2rem;min-height:42vh;}.navbar,main{padding-left:1.2rem;padding-right:1.2rem;}.cal-row{grid-template-columns:48px 1fr;}}
</style>
</head>
<body>

<canvas id="alpineCanvas"></canvas>
<div class="scene-overlay"></div>

<div class="wrapper">
  <section class="hero">
    <div>
      <h1 class="hero-title">
        <span>Switzerland</span>
        Events for Career
      </h1>
      <p class="hero-sub">IT, Tech &amp; Career events across Switzerland — Zurich, Basel, Bern, Geneva. Curated weekly by AI from Meetup, Eventbrite, LinkedIn &amp; company websites.</p>
    </div>
  </section>

  <nav class="navbar">
    <span class="filter-label">Filter</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('tech',this)">IT / Tech</button>
    <button class="filter-btn" onclick="setFilter('career',this)">Career</button>
    <button class="filter-btn" onclick="setFilter('corporate',this)">Corporate</button>
    <button class="filter-btn" onclick="setFilter('meetup',this)">Meetup</button>
    <div class="nav-right">
      <div class="last-upd">Updated<br><span id="lastUpd">—</span></div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadEvents(true)">↺ Refresh</button>
      <div class="view-toggle">
        <button class="view-btn active" id="calBtn" onclick="setView('calendar')" title="Calendar">▦</button>
        <button class="view-btn" id="listBtn" onclick="setView('list')" title="List">≡</button>
      </div>
    </div>
  </nav>

  <main>
    <div class="status-bar">
      <div class="dot" id="dot"></div>
      <span id="statusTxt">Ready</span>
    </div>
    <div class="ai-bar" id="aiBar">
      <div class="ai-dots"><span></span><span></span><span></span></div>
      <span id="aiTxt">AI is searching for events across Switzerland…</span>
    </div>
    <div class="err-bar" id="errBar"></div>
    <div class="stats-row" id="statsRow">
      <div class="stat"><strong id="sAll">0</strong><span>Total</span></div>
      <div class="stat"><strong id="sTech">0</strong><span>IT / Tech</span></div>
      <div class="stat"><strong id="sCareer">0</strong><span>Career</span></div>
      <div class="stat"><strong id="sCorp">0</strong><span>Corporate</span></div>
    </div>
    <div class="calendar-view active" id="calView"></div>
    <div class="list-view" id="lstView"></div>
  </main>
</div>

<script>
// ═══════════════════════════════════════
// CANVAS: Photorealistic Night Alps
// ═══════════════════════════════════════
(function(){
  var canvas = document.getElementById('alpineCanvas');
  function draw(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    var W = canvas.width, H = canvas.height;
    var ctx = canvas.getContext('2d');

    // SKY
    var sky = ctx.createLinearGradient(0,0,0,H*0.75);
    sky.addColorStop(0.00,'#01010a');
    sky.addColorStop(0.20,'#030312');
    sky.addColorStop(0.50,'#06091c');
    sky.addColorStop(0.80,'#090c20');
    sky.addColorStop(1.00,'#0d1022');
    ctx.fillStyle = sky;
    ctx.fillRect(0,0,W,H);

    // MOON GLOW
    var mX=W*0.72, mY=H*0.10;
    var mg = ctx.createRadialGradient(mX,mY,0,mX,mY,W*0.32);
    mg.addColorStop(0.00,'rgba(180,210,240,0.18)');
    mg.addColorStop(0.35,'rgba(120,160,220,0.07)');
    mg.addColorStop(0.70,'rgba(60,80,160,0.03)');
    mg.addColorStop(1.00,'rgba(0,0,0,0)');
    ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);

    // MOON
    var mr = W*0.018;
    var moon = ctx.createRadialGradient(mX-mr*0.25,mY-mr*0.2,0,mX,mY,mr);
    moon.addColorStop(0,'#e8f2ff');
    moon.addColorStop(0.5,'#d0e4fa');
    moon.addColorStop(1,'#b8cced');
    ctx.beginPath(); ctx.arc(mX,mY,mr,0,Math.PI*2);
    ctx.fillStyle=moon; ctx.fill();
    // crescent shadow
    ctx.beginPath(); ctx.arc(mX+mr*0.38,mY-mr*0.22,mr*0.88,0,Math.PI*2);
    ctx.fillStyle='#030312'; ctx.fill();

    // STARS
    var stars=[
      [0.04,0.04,1.1,0.9],[0.08,0.09,0.7,0.7],[0.12,0.03,1.0,0.85],[0.17,0.07,0.8,0.75],
      [0.21,0.02,0.9,0.9],[0.25,0.11,0.6,0.6],[0.30,0.05,1.0,0.85],[0.34,0.09,0.7,0.65],
      [0.38,0.02,0.85,0.8],[0.43,0.07,0.6,0.7],[0.48,0.13,0.9,0.85],[0.52,0.04,0.7,0.6],
      [0.57,0.08,1.0,0.9],[0.62,0.03,0.8,0.75],[0.66,0.12,0.6,0.6],[0.80,0.05,0.9,0.85],
      [0.84,0.09,0.7,0.7],[0.88,0.03,1.0,0.9],[0.92,0.07,0.75,0.7],[0.96,0.04,0.85,0.8],
      [0.06,0.15,0.7,0.6],[0.14,0.18,0.8,0.7],[0.22,0.16,0.6,0.55],[0.32,0.19,0.75,0.65],
      [0.41,0.17,0.65,0.6],[0.50,0.20,0.7,0.65],[0.60,0.16,0.8,0.7],[0.68,0.19,0.6,0.55],
      [0.76,0.15,0.75,0.7],[0.85,0.18,0.7,0.6],[0.94,0.16,0.8,0.7],[0.10,0.25,0.65,0.6],
      [0.28,0.26,0.7,0.65],[0.46,0.25,0.65,0.6],[0.64,0.27,0.7,0.62],[0.82,0.25,0.65,0.6]
    ];
    stars.forEach(function(s){
      ctx.beginPath(); ctx.arc(s[0]*W,s[1]*H,s[2],0,Math.PI*2);
      ctx.fillStyle='rgba(200,220,255,'+s[3]+')'; ctx.fill();
    });
    // bright stars with glow
    [[0.13,0.06,1.3],[0.36,0.04,1.2],[0.53,0.08,1.4],[0.77,0.03,1.2],[0.90,0.06,1.3]].forEach(function(s){
      var sg=ctx.createRadialGradient(s[0]*W,s[1]*H,0,s[0]*W,s[1]*H,s[2]*3);
      sg.addColorStop(0,'rgba(230,242,255,0.9)'); sg.addColorStop(1,'rgba(180,210,255,0)');
      ctx.beginPath(); ctx.arc(s[0]*W,s[1]*H,s[2]*3,0,Math.PI*2);
      ctx.fillStyle=sg; ctx.fill();
      ctx.beginPath(); ctx.arc(s[0]*W,s[1]*H,s[2]*0.7,0,Math.PI*2);
      ctx.fillStyle='rgba(240,248,255,0.98)'; ctx.fill();
    });

    // MILKY WAY
    var mw=ctx.createLinearGradient(W*0.1,0,W*0.6,H*0.28);
    mw.addColorStop(0,'rgba(80,100,180,0)');
    mw.addColorStop(0.5,'rgba(100,130,220,0.08)');
    mw.addColorStop(1,'rgba(80,100,180,0)');
    ctx.fillStyle=mw; ctx.fillRect(0,0,W,H*0.32);

    // helpers
    function px(f){return f*W;}
    function py(f){return f*H;}

    function rockFace(pts,c0,c1){
      ctx.beginPath();
      pts.forEach(function(p,i){i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]);});
      ctx.closePath();
      var minX=pts.reduce(function(a,p){return Math.min(a,p[0]);},9e9);
      var maxX=pts.reduce(function(a,p){return Math.max(a,p[0]);},-9e9);
      var minY=pts.reduce(function(a,p){return Math.min(a,p[1]);},9e9);
      var maxY=pts.reduce(function(a,p){return Math.max(a,p[1]);},-9e9);
      var g=ctx.createLinearGradient(minX,minY,maxX,maxY);
      g.addColorStop(0,c0); g.addColorStop(1,c1);
      ctx.fillStyle=g; ctx.fill();
    }

    function snowField(pts,alpha){
      if(alpha===undefined)alpha=0.88;
      ctx.beginPath();
      pts.forEach(function(p,i){i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]);});
      ctx.closePath();
      var minX=pts.reduce(function(a,p){return Math.min(a,p[0]);},9e9);
      var maxX=pts.reduce(function(a,p){return Math.max(a,p[0]);},-9e9);
      var minY=pts.reduce(function(a,p){return Math.min(a,p[1]);},9e9);
      var maxY=pts.reduce(function(a,p){return Math.max(a,p[1]);},-9e9);
      var g=ctx.createLinearGradient(minX,minY,maxX,maxY);
      g.addColorStop(0.0,'rgba(240,248,255,'+alpha+')');
      g.addColorStop(0.3,'rgba(220,236,252,'+alpha+')');
      g.addColorStop(0.6,'rgba(185,210,240,'+(alpha*0.9)+')');
      g.addColorStop(1.0,'rgba(120,160,210,'+(alpha*0.5)+')');
      ctx.fillStyle=g; ctx.fill();
    }

    function snowStreak(x1,y1,x2,y2,w,a){
      ctx.save();
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
      ctx.strokeStyle='rgba(220,238,255,'+a+')';
      ctx.lineWidth=w; ctx.lineCap='round'; ctx.stroke();
      ctx.restore();
    }

    function shadowFace(pts,alpha){
      ctx.beginPath();
      pts.forEach(function(p,i){i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]);});
      ctx.closePath();
      ctx.fillStyle='rgba(5,5,14,'+alpha+')'; ctx.fill();
    }

// ═══════════════════════════════════════
// APP LOGIC
// ═══════════════════════════════════════
var allEvents=[], currentFilter='all', currentView='calendar';
var CACHE_KEY='ch_events_v5', CACHE_TTL=7*24*60*60*1000;
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAYS=['SU','MO','TU','WE','TH','FR','SA'];

function saveCache(e){try{localStorage.setItem(CACHE_KEY,JSON.stringify({events:e,ts:Date.now()}));}catch(x){}}
function loadCache(){try{var r=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');if(!r||Date.now()-r.ts>CACHE_TTL)return null;return r;}catch(x){return null;}}
function setStatus(s,t){document.getElementById('dot').className='dot '+s;document.getElementById('statusTxt').textContent=t;}
function showAI(t){document.getElementById('aiBar').classList.add('show');document.getElementById('aiTxt').textContent=t;}
function hideAI(){document.getElementById('aiBar').classList.remove('show');}
function showErr(m){var e=document.getElementById('errBar');e.textContent='⚠ '+m;e.classList.add('show');}
function hideErr(){document.getElementById('errBar').classList.remove('show');}
function showSkels(){var s='';for(var i=0;i<5;i++)s+='<div class="skel"></div>';document.getElementById('calView').innerHTML=s;document.getElementById('lstView').innerHTML=s;}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');render();}
function setView(v){currentView=v;document.getElementById('calView').classList.toggle('active',v==='calendar');document.getElementById('lstView').classList.toggle('active',v==='list');document.getElementById('calBtn').classList.toggle('active',v==='calendar');document.getElementById('listBtn').classList.toggle('active',v==='list');render();}
function filtered(){return currentFilter==='all'?allEvents:allEvents.filter(function(e){return e.type===currentFilter;});}

function badge(t){
  var m={tech:['badge-tech','IT/Tech'],career:['badge-career','Career'],corporate:['badge-corporate','Corporate'],meetup:['badge-meetup','Meetup']};
  var d=m[t]||['badge-tech','Event'];
  return '<span class="ev-badge '+d[0]+'">'+d[1]+'</span>';
}

function renderCal(evs){
  var el=document.getElementById('calView');
  if(!evs.length){el.innerHTML='<div class="empty"><div class="ico">❄</div><p>No events for this filter</p></div>';return;}
  var bm={};
  evs.forEach(function(ev){
    var d=new Date(ev.date); var mk=d.getFullYear()+'-'+d.getMonth();
    if(!bm[mk])bm[mk]={y:d.getFullYear(),m:d.getMonth(),days:{}};
    var dk=ev.date.slice(0,10);
    if(!bm[mk].days[dk])bm[mk].days[dk]=[];
    bm[mk].days[dk].push(ev);
  });
  var html='';
  Object.values(bm).forEach(function(mo){
    html+='<div class="month-label">'+MONTHS[mo.m]+' '+mo.y+'</div>';
    Object.entries(mo.days).sort(function(a,b){return a[0].localeCompare(b[0]);}).forEach(function(entry){
      var dk=entry[0]; var ea=entry[1];
      var d=new Date(dk);
      var cards=ea.map(function(ev){
        return '<div class="ev-card '+ev.type+'" onclick="openLink(\''+ev.url+'\')">'+
          '<div class="ev-top"><div class="ev-title">'+ev.title+'</div>'+badge(ev.type)+'</div>'+
          '<div class="ev-meta"><span>📍 '+ev.location+'</span>'+(ev.time?'<span>🕐 '+ev.time+'</span>':'')+(ev.organizer?'<span>🏢 '+ev.organizer+'</span>':'')+'</div>'+
          '<div class="ev-src">via '+ev.source+'</div></div>';
      }).join('');
      html+='<div class="cal-row">'+
        '<div class="cal-date"><div class="num">'+String(d.getDate()).padStart(2,'0')+'</div><div class="dn">'+DAYS[d.getDay()]+'</div></div>'+
        '<div class="cal-events">'+cards+'</div></div>';
    });
  });
  el.innerHTML=html;
}

function renderList(evs){
  var el=document.getElementById('lstView');
  if(!evs.length){el.innerHTML='<div class="empty"><div class="ico">❄</div><p>No events for this filter</p></div>';return;}
  var sorted=evs.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  el.innerHTML=sorted.map(function(ev){
    var d=new Date(ev.date);
    var ds=String(d.getDate()).padStart(2,'0')+' '+MONTHS[d.getMonth()]+' '+d.getFullYear()+(ev.time?' · '+ev.time:'');
    return '<div class="list-card '+ev.type+'" onclick="openLink(\''+ev.url+'\')">'+
      '<div class="lc-date">'+ds+'</div>'+
      '<div class="lc-title">'+ev.title+' '+badge(ev.type)+'</div>'+
      (ev.description?'<div class="lc-desc">'+ev.description+'</div>':'')+
      '<div class="lc-footer"><span class="lc-meta">📍 '+ev.location+(ev.organizer?' · 🏢 '+ev.organizer:'')+'</span>'+
      (ev.url&&ev.url!=='#'?'<a class="lc-link" href="'+ev.url+'" target="_blank" onclick="event.stopPropagation()">Details →</a>':'')+
      '</div><div class="lc-src">Source: '+ev.source+'</div></div>';
  }).join('');
}

function render(){var f=filtered();if(currentView==='calendar')renderCal(f);else renderList(f);}
function updateStats(evs){
  document.getElementById('statsRow').classList.add('show');
  document.getElementById('sAll').textContent=evs.length;
  document.getElementById('sTech').textContent=evs.filter(function(e){return e.type==='tech';}).length;
  document.getElementById('sCareer').textContent=evs.filter(function(e){return e.type==='career';}).length;
  document.getElementById('sCorp').textContent=evs.filter(function(e){return e.type==='corporate';}).length;
}
function openLink(url){if(url&&url!=='#')window.open(url,'_blank');}

async function loadEvents(force){
  if(force===undefined)force=false;
  var btn=document.getElementById('refreshBtn');
  btn.disabled=true; hideErr();
  if(!force){
    var c=loadCache();
    if(c){
      allEvents=c.events;
      document.getElementById('lastUpd').textContent=new Date(c.ts).toLocaleDateString('en-CH');
      setStatus('done',allEvents.length+' events from cache');
      updateStats(allEvents); render(); btn.disabled=false; return;
    }
  }
  setStatus('loading','Searching for events…');
  showAI('AI is searching Meetup, Eventbrite, LinkedIn and company websites…');
  showSkels();
  var today=new Date();
  var ts=today.toISOString().split('T')[0];
  var end=new Date(today); end.setMonth(end.getMonth()+3);
  var es=end.toISOString().split('T')[0];
  var prompt='You are a Switzerland event researcher. Today is '+ts+'.\n\nFind REAL upcoming events in Switzerland between '+ts+' and '+es+'.\nSources: Meetup.com, Eventbrite, LinkedIn Events, company websites.\nFocus on:\n1. IT/Tech meetups and conferences in Zurich, Basel, Bern, Geneva\n2. Career fairs: ETH Zurich, EPFL, universities\n3. Corporate events: Swisscom, UBS, SBB, Google, Microsoft, SAP, Nestlé, Novartis, Roche, ABB\n4. ServiceNow, Salesforce, SAP HRSD user groups\n\nReturn ONLY valid JSON array (no markdown). Each object:\n{"title":"string","date":"YYYY-MM-DD","time":"HH:MM or null","location":"City, Venue","type":"tech|career|corporate|meetup","organizer":"string or null","description":"1-2 sentences","url":"real URL or #","source":"source name"}\nMinimum 15 events after '+ts+'.';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})});
    if(!res.ok)throw new Error('API '+res.status);
    var data=await res.json();
    var raw='';
    data.content.forEach(function(b){if(b.type==='text')raw+=b.text;});
    var m=raw.match(/\[[\s\S]*\]/);
    if(!m)throw new Error('Parse failed');
    var events=JSON.parse(m[0]);
    if(!Array.isArray(events)||!events.length)throw new Error('Empty');
    events.sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    allEvents=events; saveCache(events);
    document.getElementById('lastUpd').textContent=new Date().toLocaleDateString('en-CH');
    hideAI(); setStatus('done',events.length+' events found'); updateStats(events); render();
  }catch(err){
    hideAI(); setStatus('error','Load failed — showing demo data');
    showErr('Could not load live data: '+err.message+'. Showing curated demo events.');
    loadDemo();
  }
  btn.disabled=false;
}
